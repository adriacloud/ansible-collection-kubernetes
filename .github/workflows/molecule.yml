name: molecule

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cluster-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: 1.35.2
            capi: 1.12.3
            capo: 0.14.1
            orc: 2.4.0
            distro: rockylinux10
          - kubernetes: 1.35.2
            capi: 1.12.3
            capo: 0.14.1
            orc: 2.4.0
            distro: ubuntu2404
          - kubernetes: 1.35.2
            capi: 1.12.3
            capo: 0.14.1
            orc: 2.4.0
            distro: debian13
    steps:
      - name: Checkout project
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 'test-requirements.txt'

      - name: Install Tox
        run: pip install tox

      - name: Turn off swap
        run: sudo swapoff -a

      - name: Run Tox
        run: tox -e molecule-cluster-api
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          KUBERNETES_VERSION: ${{ matrix.kubernetes }}
          CLUSTER_API_VERSION: ${{ matrix.capi }}
          CLUSTER_API_INFRA_VERSION: ${{ matrix.capo }}
          CLUSTER_API_OPENSTACK_CONTROLLER: ${{ matrix.orc }}

  kubernetes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        version:
          - 1.32.7
          - 1.33.3
          - 1.34.5
          - 1.35.2
        distro:
          - rockylinux10
          - ubuntu2404
          - debian13
        scenario:
          - molecule-ha
    steps:
      - name: Checkout project
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 'test-requirements.txt'

      - name: Install Tox
        run: pip install tox

      - name: Turn off swap
        run: sudo swapoff -a

      - name: Run Tox
        run: tox -e ${{ matrix.scenario }}
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          KUBERNETES_VERSION: ${{ matrix.version }}

  upgrades:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - old_version: 1.32.7
            version: 1.33.3
          - old_version: 1.33.3
            version: 1.34.5
          - old_version: 1.34.5
            version: 1.35.2

    steps:
      - name: Checkout project
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 'test-requirements.txt'

      - name: Install Tox
        run: pip install tox

      - name: Turn off swap
        run: sudo swapoff -a

      - name: Bump number of inotify watchers
        run: sudo sysctl fs.inotify.max_user_watches=524288

      - name: Run Tox
        run: tox -e molecule-cluster-upgrade
        env:
          OLD_KUBERNETES_VERSION: ${{ matrix.old_version }}
          KUBERNETES_VERSION: ${{ matrix.version }}
