- name: Including download and install of containerd
  ansible.builtin.import_role:
    name: adriacloud.kubernetes.download_artifacts
  vars:
    download_artifacts_list:
      - url: "{{ containerd_runc_download_url }}"
        dest: "{{ containerd_runc_download_dest }}"
        checksum: "{{ containerd_runc_download_checksum }}"
        owner: root
        group: root
        mode: '0755'
      - url: "{{ containerd_download_url }}"
        dest: "{{ containerd_download_dest }}"
        checksum: "{{ containerd_download_checksum }}"
        owner: root
        group: root
        unarchive: true
        unarchive_dest: /usr/bin
        unarchive_extra_opts:
          - --strip-components=1

- name: Create configuration directory
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode | default('0755') }}"
  when:
    - item.condition | default(true)
  loop:
    - path: "{{ containerd_config_file | dirname }}"
    - path: "{{ containerd_work_directory }}"
      mode: "0700"

- name: Provision containerd config file
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ containerd_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart containerd

- name: Provision insecure registries for v2
  when:
    - containerd_version is version('2.0', '>=')
    - containerd_insecure_registries | length > 0
  block:
    - name: Create registry directories
      ansible.builtin.file:
        path: "{{ containerd_config_file | dirname }}/certs.d/{{ registry }}"
        state: directory
        mode: "0755"
      loop: "{{ containerd_insecure_registries }}"
      loop_control:
        loop_var: registry

    - name: Provision registry configuration
      ansible.builtin.template:
        src: hosts.toml.j2
        dest: "{{ containerd_config_file | dirname }}/certs.d/{{ registry }}/hosts.toml"
        mode: "0644"

- name: Deploy systemd service
  ansible.builtin.import_tasks:
    file: containerd_service.yml
