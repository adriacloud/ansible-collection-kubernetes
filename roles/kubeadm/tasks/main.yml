- name: Download and install kubeadm
  ansible.builtin.include_role:
    name: adriacloud.kubernetes.download_artifacts
  vars:
    download_artifacts_list:
      - url: "{{ kubeadm_download_url }}"
        dest: "{{ kubeadm_download_dest }}"
        checksum: "sha256:{{ kubeadm_binary_checksum }}"
        owner: root
        group: root
        mode: '0755'
