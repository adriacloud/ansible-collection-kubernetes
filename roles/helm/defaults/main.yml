helm_version: v4.2.0

helm_download_url: "https://get.helm.sh/helm-{{ helm_version }}-{{ ansible_facts['system'] | lower }}-{{ defaults_goarch }}.tar.gz"
helm_download_dest: "/var/lib/downloads/helm-{{ helm_version }}-{{ ansible_facts['system'] | lower }}-{{ defaults_goarch }}.tar.gz"
helm_binary_checksum: "sha256:{{ helm_download_url }}.sha256"

helm_diff_version: v3.15.7
helm_diff_checksums:
