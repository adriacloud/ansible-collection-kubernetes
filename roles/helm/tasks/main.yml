- name: Install Helm
  block:

    - name: Including download and install of Helm
      ansible.builtin.include_role:
        name: adriacloud.kubernetes.download_artifacts
      vars:
        download_artifacts_list:
          - url: "{{ helm_download_url }}"
            dest: "{{ helm_download_dest }}"
            checksum: "sha256:{{ helm_binary_checksum }}"
            owner: root
            group: root
            unarchive: true
            unarchive_dest: /usr/bin
            unarchive_include:
              - "linux-{{ defaults_goarch }}/helm"
            unarchive_extra_opts:
              - --strip-components=1

    - name: Add bash autocomplete for helm
      ansible.builtin.lineinfile:
        path: /root/.bashrc
        line: "source <(helm completion bash)"
        insertbefore: EOF

- name: Install "helm-diff" plugin
  when:
    - helm_diff_version | length > 0
  block:

    - name: Get Helm plugins dir
      ansible.builtin.command: helm env HELM_PLUGINS
      changed_when: false
      register: helm_plugins_path

    - name: Create Helm plugins directory if it does not exist
      ansible.builtin.file:
        path: "{{ helm_plugins_path.stdout }}"
        state: directory
        mode: "0755"

    # Note(okozachenko1203): Remove legacy plugin to avoid two plugins claim the same name.
    - name: Remove Helm diff plugin installed by kubernetes.core.helm_plugin
      ansible.builtin.file:
        path: "{{ helm_plugins_path.stdout }}/helm-diff"
        state: absent

    - name: Download and Install Helm diff plugin
      ansible.builtin.include_role:
        name: adriacloud.kubernetes.download_artifacts
      vars:
        download_artifacts_list:
          - url: "{{ helm_diff_download_url }}"
            dest: "{{ helm_diff_download_dest }}"
            checksum: "sha256:{{ helm_diff_checksum }}"
            owner: root
            group: root
            unarchive: true
            unarchive_dest: "{{ helm_plugins_path.stdout }}"
