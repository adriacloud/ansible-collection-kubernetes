- name: Gather variables for each operating system
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_version'] | lower }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Install required packages
  ansible.builtin.package:
    name: "{{ kubelet_packages }}"
    state: "{{ kubelet_packages_state }}"

- name: Including download and install of kubelet and dependencies
  ansible.builtin.include_role:
    name: adriacloud.kubernetes.download_artifacts
  vars:
    download_artifacts_list: "{{ kubelet_download_artifacts }}"

- name: Include tasks for CNI plugins configuration
  ansible.builtin.include_tasks:
    file: kubelet_cni_plugins.yml
  when:
    - kubelet_cni_plugins_version | length > 0

- name: Include tasks for CRI tools configuration
  ansible.builtin.include_tasks:
    file: kubelet_cri_config.yml
  when:
    - kubelet_crictl_version | length > 0

- name: Configure sysctl values
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: "{{ item.set | default(omit) }}"
    state: present
  loop: "{{ kubelet_sysctls }}"

- name: Import tasks for kubelet configuration
  ansible.builtin.import_tasks:
    file: kubelet_config.yml

- name: Force any restarts if necessary
  ansible.builtin.meta: flush_handlers
