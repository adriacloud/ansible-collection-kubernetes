kubectl_download_url: >-
  https://dl.k8s.io/release/v{{ kubectl_version }}/bin/{{ ansible_facts['system'] | lower }}/{{ defaults_goarch }}/kubectl
kubectl_download_dest: /usr/bin/kubectl
kubectl_binary_checksum: "sha256:{{ kubectl_download_url }}.sha256"
