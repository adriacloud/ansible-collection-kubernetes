cert_manager_helm_release_name: cert-manager
cert_manager_helm_release_namespace: cert-manager
cert_manager_helm_values: {}
cert_manager_helm_repo_url: https://charts.jetstack.io
cert_manager_helm_charts:
  - name: "{{ cert_manager_helm_release_name }}"
    namespace: "{{ cert_manager_helm_release_namespace }}"
    repo_name: "jetstack"
    repo_url: "{{ cert_manager_helm_repo_url }}"
    version: "{{ cert_manager_tools_version }}"
    values: "{{ _cert_manager_helm_values | combine(cert_manager_helm_values, recursive=True) }}"

cert_manager_node_selector: {}

cert_manager_cli_version: v1.11.5
cert_manager_tools_version: v1.11.5
cert_manager_image_cli: "quay.io/jetstack/cert-manager-ctl:{{ cert_manager_cli_version }}"
cert_manager_image_controller: "quay.io/jetstack/cert-manager-controller:{{ cert_manager_tools_version }}"
cert_manager_image_cainjector: "quay.io/jetstack/cert-manager-cainjector:{{ cert_manager_tools_version }}"
cert_manager_image_webhook: "quay.io/jetstack/cert-manager-webhook:{{ cert_manager_tools_version }}"
cert_manager_image_acmesolver: "quay.io/jetstack/cert-manager-acmesolver:{{ cert_manager_tools_version }}"
