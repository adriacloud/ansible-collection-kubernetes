- name: Deploy Helm chart
  ansible.builtin.include_role:
    name: adriacloud.kubernetes.helm_deploy
  vars:
    helm_deploy_python_interpreter: "{{ ansible_collection_kubernetes_target_venv | default('/usr') }}/bin/python3"
    helm_deploy_charts: "{{ cert_manager_helm_charts }}"
