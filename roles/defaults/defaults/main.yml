defaults_goarch_mapping:
  x86_64: amd64
  aarch64: arm64
  armv7l: arm

defaults_goarch: "{{ defaults_goarch_mapping.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

defaults_containerd_socket: /run/containerd/containerd.sock
