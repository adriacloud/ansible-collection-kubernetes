- name: Install required dependencies for unarchive
  ansible.builtin.package:
    name: "{{ download_artifacts_package_install }}"
    state: present

- name: Unarchive with native Ansible module
  ansible.builtin.unarchive:
    src: "{{ item.dest }}"
    dest: "{{ item.unarchive_dest | default(item.dest | dirname) }}"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode | default(omit) }}"
    remote_src: true
    include: "{{ item.unarchive_include | default(omit) }}"
    exclude: "{{ item.unarchive_exclude | default(omit) }}"
    extra_opts: "{{ item.unarchive_extra_opts | default(omit) }}"
  notify: "{{ item.notify }}"
  loop: >-
    {{
      _download_artifacts_compressed | selectattr('unarchive_format', 'undefined') +
      _download_artifacts_compressed | selectattr('unarchive_format', 'defined') | selectattr('unarchive_format', 'eq', 'tgz')
    }}

- name: Unarchive with command
  vars:
    unpack_argv:
      - "{{ download_artifacts_unarchive_binaries[item['unarchive_format']] }}"
      - "{{ item.dest }}"
  ansible.builtin.command:
    argv: "{{ unpack_argv | flatten }}"
    creates: "{{ (item.dest | split('.'))[:-1] | join('.') }}"
  loop: "{{ _download_artifacts_compressed | selectattr('unarchive_format', 'defined') | selectattr('unarchive_format', 'ne', 'tgz') }}"
