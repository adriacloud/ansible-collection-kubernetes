_download_artifacts_notify: "{{ download_artifacts_list | selectattr('notify', 'defined') | map(attribute='notify') | flatten }}"

download_artifacts_unarchive_package_names:
  tgz:
    redhat: tar
    debian: tar
  gz:
    redhat: gzip
    debian: gzip
  xz:
    redhat: xz
    debian: xz-utils
  bz2:
    redhat: bzip2
    debian: bzip2

download_artifacts_unarchive_binaries:
  gz: gunzip
  xz:
    - xz
    - -d
  bz2:
    - bzip2
    - -d

download_artifacts_package_install: |-
  {% set packages = [] %}
  {% for artifact in _download_artifacts_compressed %}
  {%   set format = artifact.get('unarchive_format', 'tgz') %}
  {%   if format == 'tgz' %}
  {%     set _ = packages.append(download_artifacts_unarchive_package_names['tgz'][ansible_facts['os_family'] | lower]) %}
  {%   elif format == 'gz' %}
  {%     set _ = packages.append(download_artifacts_unarchive_package_names['gz'][ansible_facts['os_family'] | lower]) %}
  {%   elif format == 'xz' %}
  {%     set _ = packages.append(download_artifacts_unarchive_package_names['xz'][ansible_facts['os_family'] | lower]) %}
  {%   elif format == 'bz2' %}
  {%     set _ = packages.append(download_artifacts_unarchive_package_names['bz2'][ansible_facts['os_family'] | lower]) %}
  {%   endif %}
  {% endfor %}
  {{ packages | unique }}
