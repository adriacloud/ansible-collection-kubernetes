- name: Cleanup container mounts
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Cleanup if containers are reachable
      block:
        - name: Verify container is actually running
          ansible.builtin.raw: "true"
          changed_when: false

        - name: Stop containerd
          ansible.builtin.service:
            name: containerd
            state: stopped

        - name: Force unmount all containerd resources
          ansible.builtin.shell: |
            # Find all mounts under the containerd state and run dirs
            for mnt in $(mount | grep -E "/run/containerd|/var/lib/containerd" | awk '{print $3}' | sort -r); do
              umount -rl "$mnt" || true
            done
          become: true
          changed_when: false
          # This task is prone to failing if the container is already gone,
          # so we ignore errors to keep the cleanup moving.
          ignore_errors: true

        - name: Remove containerd content from mount paths
          ansible.builtin.file:
            path: /var/lib/containerd
            state: absent
      rescue:
        - name: Skip if container is dead/unreachable
          ansible.builtin.debug:
            msg: "Skipping internal cleanup."
