- name: Run verification of artifact download
  hosts: artifacts
  tasks:
    - name: Fetch information about downloaded artifact
      ansible.builtin.stat:
        path: "{{ test_dest }}"
        get_checksum: true
        checksum_algorithm: sha256
      register: artifact_download

    - name: Fetch infromation about created handler
      ansible.builtin.stat:
        path: "{{ test_handler_path }}"
      register: handler_executed

    - name: Fetch information about artifact decompressed
      ansible.builtin.stat:
        path: "{{ test_dest | dirname }}/helm"
      register: helm_binary

    - name: Verify assertions
      ansible.builtin.assert:
        that:
          - artifact_download.stat.isreg
          - artifact_download.stat.checksum == test_checksum
          - handler_executed.stat.exists
          - helm_binary.stat.isreg
