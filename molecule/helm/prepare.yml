- name: Generic molecule hosts preparation
  ansible.builtin.import_playbook: ../kubernetes/prepare.yml

- name: Configure Kubernetes
  hosts: controllers
  become: true
  roles:
    - role: adriacloud.kubernetes.kube_vip
      tags:
        - kube-vip

    - role: adriacloud.kubernetes.containerd
      tags:
        - containerd

    - role: adriacloud.kubernetes.kubernetes
      tags:
        - kubernetes
