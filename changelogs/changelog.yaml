---
ancestor: null
releases:
  26.3.0:
    changes:
      bugfixes:
        - Ensured, that proper python interpreter is used, when ansible_collection_kubernetes_target_venv
          is defined.
      deprecated_features:
        - Collection no longer cleans-up components, if they were installed from system
          packages.
        - Support for Debian 12 has been deprecated
      minor_changes:
        - Added support for CAPO versions 0.13.4 and 0.14.1
        - Added support for HELM versions v3.19.5 and v3.20.0
        - Added support for ansible-core 2.19 and later.
        - Added support for clusterctl versions 1.10.10, 1.11.6, 1.12.3
        - Added support for kubernetes versions 1.34.5 and 1.35.2
    fragments:
      - ansible_core_2_19.yml
      - k8s_1_35.yml
      - no_forget_package.yml
    release_date: '2026-03-11'
  26.4.1:
    changes:
      breaking_changes:
        - Role for ``flux`` deployment has been removed from the collection. It was
          not required for a kubernetes deployment, and goal of this collection is
          to perform a functional kubernetes cluster deployment, while management
          tools for these kubernetes clusters are left out of the collection scope.
      major_changes:
        - Dependecy on `vexxhost.containers` has been completely removed
        - Minimal version of `comminuty.general` collection required is 7.0.0
        - Role `vexxhost.containers.containerd` has been replaced with `adriacloud.kubernetes.containerd`,
          which is included explicitly in tasks and can accept a list of artifacts
          for download.
        - Role `vexxhost.containers.download_artifact` has been replaced with `adriacloud.kubernetes.download_artifacts`,
          which is included explicitly in tasks and can accept a list of artifacts
          for download.
        - The `kubelet` role has incorporated logic for CRI and CNI deployment and
          configuration. Please, use variables `kubelet_crictl_version` and `kubelet_cni_plugins_version`
          to define desired versions of tools. If set to an empty string or null values,
          deployment of tools will be skipped.
      minor_changes:
        - Added role `adriacloud.kubernetes.containerd` which aims to replace the
          `vexxhost.containers.containerd` role in the future. While it maintains
          simmilar set of features, it has a series of significant differences. The
          role does not mandate a list of supported runc/containerd versions, and
          any valid version set could be used freely.
        - Added role `adriacloud.kubernetes.defaults` which is going to carry re-usable
          variables, not avoid repeating ourselves. Role consists solely from defaults
          file, and will be included/loaded from other roles in the collection.
        - Added role `adriacloud.kubernetes.download_artifacts` which aims to replace
          the `vexxhost.containers.download_artifact` role in the future. Main difference
          is that the new role accepts a list of arguments to download, instead requiring
          to call the role include in a loop. It maintains all same features as the
          original one. Though, in order to use proxy connection, operators are expected
          to define `environment` on the playbook level, or for the `include_role`.
        - Added variable `defaults_containerd_socket` with default value of `/run/containerd/containerd.sock`.
          It is used in both `containerd` and `kubelet` roles.
        - Collection no longer requires presence of `docker-image-py` Python package
          for the ansible controller. The filter `adriacloud.kubernetes.docker_image`
          now implements the same logic internally.
        - Helm diff plugin installation can be disabled with `adriacloud.kubernetes.helm`
          role by setting `helm_diff_version` to an empty string.
        - Introduced a new helm_deploy role, which takes care of installing and deploying
          helm charts to the deployed k8s cluster.
        - Introduced variable `upload_helm_chart_list` which allows to accept a list
          of helm charts to be copied by the role. By default, the variable is populated
          from `upload_helm_chart_src` and `upload_helm_chart_dest` for backwards
          compatability.
        - Reduced amount of external dependenices, specifically on helper roles from
          `vexxhost.containers` like `vexxhost.containers.package` and `vexxhost.containers.directory`.
      bugfixes:
        - Fixed collection publishing to Galaxy by adding README.md to newly added
          roles.
    fragments:
      - add-helm-deploy.yaml
      - containerd-role.yaml
      - download-artifacts-role.yaml
      - drop-flux-role.yaml
      - kubelet-independent.yaml
      - no-docker-image-py.yaml
      - reduce-dependencies.yaml
      - upload-helm-chart-list.yaml
      - fix-galaxy-upload.yaml
    release_date: '2026-03-30'
