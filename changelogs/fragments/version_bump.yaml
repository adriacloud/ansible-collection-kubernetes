release_summary:
  - Versions for Helm, kubeadm, kubectl, kubelet, can now be set to an
    arbitrary ones, without need to maintain a checksum matrix separately.
minor_changes:
  - Default haproxy version has been updated from 2.5 to 3.2
  - Added support for clusterctl version 1.13.2
  - Default containerd version has been switched to 2.3.1
