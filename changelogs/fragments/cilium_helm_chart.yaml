---
breaking_changes:
  - Helm chart from cilium is now being deployed from the remote source
    using `adriacloud.kubernetes.helm_deploy` role.
    You can override `cilium_helm_repo_url` variable or
    `cilium_helm_charts` mapping as a whole to point to a local
    mirror of the helm chart for offline deployments.
minor_changes:
  - Added variables `cilium_helm_repo_url`, `cilium_version` and
    `cilium_helm_charts` to control the Helm chart location
    and definition for Cilium.
